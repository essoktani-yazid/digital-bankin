<div class="card mt-4">
  <div class="card-header">
    New Customer
  </div>

  <div class="card-body">
    <form [formGroup]="newCustomerFormGroup" (ngSubmit)="handleCreateCustomer()">
      <div class="mb-3">
        <label class="form-label">Name</label>
        <input type="text" formControlName="name" class="form-control">
        <span class="text-danger" *ngIf="newCustomerFormGroup.controls['name'].touched && 
        newCustomerFormGroup.controls['name'].errors?.required">
          Name is required
        </span>
        <span class="text-danger" *ngIf="newCustomerFormGroup.controls['name'].touched && 
        newCustomerFormGroup.controls['name'].errors?.minlength">
          Name must be at least 4 characters long
        </span>
      </div>

      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" formControlName="email" class="form-control">
        <span class="text-danger" *ngIf="newCustomerFormGroup.controls['email'].touched && 
        newCustomerFormGroup.controls['email'].errors?.required">
          Email is required
        </span>
        <span class="text-danger" *ngIf="newCustomerFormGroup.controls['email'].touched && 
        newCustomerFormGroup.controls['email'].errors?.email">
          Email is invalid
        </span>
      </div>

      <button [disabled]="newCustomerFormGroup.invalid" type="submit" class="btn btn-primary">Create Customer</button>
    </form>
  </div>
</div>
